version: '3.8'

services:
  backend-cpu:
    profiles: ["cpu"]
    build:
      context: ./
      dockerfile: ./backend/Dockerfile.cpu
    container_name: captp-backend-cpu
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CAPTP_RUNTIME_PROFILE=cpu
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend

  backend-gpu:
    profiles: ["gpu"]
    build:
      context: ./
      dockerfile: ./backend/Dockerfile.gpu
    container_name: captp-backend-gpu
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CAPTP_RUNTIME_PROFILE=gpu
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  frontend:
    build:
      context: ./
      dockerfile: ./frontend/Dockerfile
    container_name: captp-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend-cpu

